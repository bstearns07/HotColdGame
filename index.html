<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Guess the Number</title>
        <link rel="stylesheet" href="src/output.css">
    </head>

    <body class="body">
        <div class="game-container">
            <h1 class="h1 animate-title-in">Guess the Number</h1>

            <!-- Header Row -->
            <div class="row">
                <div class="sm:col-span-12 text-center">
                    <p id="range">It's between 1 and 100.</p>
                    <p>Best Score: <span id="best_score">--</span></p>
                </div>
            </div>

            <!-- User Input and Buttons Row -->
            <div class="row mt-4">
                <input type="text" id="number" placeholder="Enter your guess">
                <button class="button" id="guess">Guess</button>
                <button class="button" id="play_again">Play Again</button>
                <button class="button" id="update-max">Update Max</button>
            </div>

            <!-- Message Output -->
            <div class="row mt-3">
                <h3 class="col-span-1 sm:col-span-2 font-semibold">Game Says:</h3>
                <label class="output col-span-1 sm:col-span-6 w-full block" id="message">--</label>
            </div>

            <!-- History -->
            <div class="row mt-3">
                <h3 class="col-span-1 sm:col-span-2 font-semibold">Guess History:</h3>
                <span class="output col-span-1 sm:col-span-6 w-full block" id="history"></span>
            </div>

        </div>
        <script src="guess.js"></script>
    </body>
</html>
